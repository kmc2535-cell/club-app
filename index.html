<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Club Reactor</title>
    <meta
      name="description"
      content="マイク入力に反応してブラウザ全体がクラブ演出になるローカル向けWebアプリ"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="club-canvas" aria-hidden="true"></canvas>

    <div class="club-shell">
      <header class="status-bar">
        <div class="status-pill">
          <span class="status-label">MIC</span>
          <span id="mic-status" class="status-value">BOOTING</span>
        </div>
        <div class="status-pill">
          <span class="status-label">MODE</span>
          <span id="intensity-status" class="status-value">IDLE FLASH</span>
        </div>
      </header>

      <section class="mirror-rig" aria-label="Disco mirror ball">
        <div class="mirror-cable"></div>
        <div id="mirrorball" class="mirrorball">
          <div class="mirror-core"></div>
          <div class="mirror-glow"></div>
        </div>
        <div class="mirror-shadow"></div>
      </section>

      <div class="ambient-haze haze-left"></div>
      <div class="ambient-haze haze-right"></div>

      <div id="permission-panel" class="permission-panel" data-state="info">
        <p id="permission-text">
          Chromeでマイク許可を出すと、周囲の音で演出がさらに激しくなります。
        </p>
        <ol id="permission-steps" class="permission-steps" hidden></ol>
        <div id="permission-actions" class="permission-actions" hidden>
          <button id="retry-mic-button" class="permission-button" type="button">
            マイクを再試行
          </button>
        </div>
      </div>

      <div class="portrait-warning">
        <span>横長画面での表示専用です</span>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
